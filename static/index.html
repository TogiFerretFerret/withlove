<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>withlove</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0d0f;
    color: #e8e8e8;
    font-family: system-ui, -apple-system, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.75rem;
    padding: 2rem;
    user-select: none;
  }

  #status {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #333;
    transition: color 0.3s;
  }
  #status.connected  { color: #4ade80; }
  #status.connecting { color: #facc15; }

  .metrics {
    display: flex;
    gap: 4.5rem;
    align-items: flex-end;
  }

  .metric {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.2rem;
  }

  .metric-label {
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #333;
  }

  .metric-val {
    font-size: 4.5rem;
    font-weight: 800;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    color: #e8e8e8;
    transition: color 0.25s;
  }

  #bpm-val { font-size: 6.5rem; }

  .metric-unit {
    font-size: 0.72rem;
    color: #444;
    font-weight: 300;
  }

  .metric-sub {
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #444;
    height: 1em;
    transition: color 0.25s;
  }

  #ecg-wrap {
    width: min(820px, calc(100vw - 4rem));
    height: 230px;
    border-radius: 6px;
    overflow: hidden;
    background: #06060a;
  }

  #ecg-canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  #stats {
    display: flex;
    gap: 2.75rem;
    font-size: 0.65rem;
    color: #333;
  }

  #stats span {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.25rem;
  }

  #stats strong {
    color: #777;
    font-size: 0.9rem;
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>

<div id="status" class="connecting">connecting</div>

<div class="metrics">
  <div class="metric">
    <div class="metric-label">heart rate</div>
    <div class="metric-val" id="bpm-val">--</div>
    <div class="metric-unit">bpm</div>
    <div class="metric-sub" id="hr-zone"></div>
  </div>
  <div class="metric">
    <div class="metric-label">stress</div>
    <div class="metric-val" id="stress-val">--</div>
    <div class="metric-unit">/ 100</div>
    <div class="metric-sub" id="stress-label"></div>
  </div>
  <div class="metric">
    <div class="metric-label">hrv · rmssd</div>
    <div class="metric-val" id="rmssd-val" style="font-size:4rem">--</div>
    <div class="metric-unit">ms</div>
    <div class="metric-sub" id="rmssd-label"></div>
  </div>
</div>

<div id="ecg-wrap">
  <canvas id="ecg-canvas"></canvas>
</div>

<div id="stats">
  <span>hr min <strong id="s-hr-min">--</strong></span>
  <span>hr max <strong id="s-hr-max">--</strong></span>
  <span>hr avg <strong id="s-hr-avg">--</strong></span>
  <span>stress avg <strong id="s-stress-avg">--</strong></span>
</div>

<script>
// ── ECG canvas setup ─────────────────────────────────────────
const ecgCanvas = document.getElementById('ecg-canvas');
const ecgCtx    = ecgCanvas.getContext('2d');

const ECG_N  = 650; // ~5s at 130 Hz
const ecgBuf = new Float32Array(ECG_N).fill(0);
let ecgHead  = 0;
let ecgPeak  = 500;
let baseline = null;

function resizeECG() {
  const dpr  = window.devicePixelRatio || 1;
  const rect = ecgCanvas.getBoundingClientRect();
  ecgCanvas.width  = rect.width  * dpr;
  ecgCanvas.height = rect.height * dpr;
  ecgCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resizeECG);
resizeECG();

function filterSample(raw) {
  if (baseline === null) baseline = raw;
  baseline = 0.999 * baseline + 0.001 * raw; // slow high-pass to kill DC drift
  return raw - baseline;
}

function addEcgSamples(samples) {
  for (const raw of samples) {
    const v      = filterSample(raw);
    ecgBuf[ecgHead] = v;
    ecgHead      = (ecgHead + 1) % ECG_N;
    ecgPeak      = Math.max(ecgPeak * 0.9998, Math.abs(v));
  }
}

function drawECG() {
  const w   = ecgCanvas.getBoundingClientRect().width;
  const h   = ecgCanvas.getBoundingClientRect().height;
  const mid = h / 2;
  const sc  = (h * 0.44) / Math.max(ecgPeak, 1);

  // background
  ecgCtx.fillStyle = '#06060a';
  ecgCtx.fillRect(0, 0, w, h);

  // subtle grid
  ecgCtx.strokeStyle = 'rgba(74,222,128,0.04)';
  ecgCtx.lineWidth = 1;
  for (let i = 1; i < 5; i++) {
    ecgCtx.beginPath(); ecgCtx.moveTo(0, h * i / 5); ecgCtx.lineTo(w, h * i / 5); ecgCtx.stroke();
    ecgCtx.beginPath(); ecgCtx.moveTo(w * i / 5, 0); ecgCtx.lineTo(w * i / 5, h); ecgCtx.stroke();
  }

  // sweep erase zone
  const headX  = (ecgHead / ECG_N) * w;
  const eraseW = Math.max(w * 0.04, 16);
  ecgCtx.fillStyle = '#06060a';
  ecgCtx.fillRect(headX, 0, eraseW, h);

  // sweep cursor line
  ecgCtx.strokeStyle = 'rgba(74,222,128,0.2)';
  ecgCtx.lineWidth = 1;
  ecgCtx.beginPath();
  ecgCtx.moveTo(headX, 0);
  ecgCtx.lineTo(headX, h);
  ecgCtx.stroke();

  // ECG trace — draw directly from circular buffer (index i → x = i/N * w)
  ecgCtx.strokeStyle = '#4ade80';
  ecgCtx.lineWidth   = 1.5;
  ecgCtx.lineJoin    = 'round';
  ecgCtx.beginPath();
  let pen = false;

  for (let i = 0; i < ECG_N; i++) {
    const x       = (i / ECG_N) * w;
    const inErase = x >= headX && x <= headX + eraseW;
    if (inErase) { pen = false; continue; }
    const y = mid - ecgBuf[i] * sc;
    if (!pen) { ecgCtx.moveTo(x, y); pen = true; }
    else ecgCtx.lineTo(x, y);
  }
  ecgCtx.stroke();

  requestAnimationFrame(drawECG);
}
drawECG();

// ── zones ────────────────────────────────────────────────────
const hrZones = [
  { max: 100, label: 'rest',      color: '#60a5fa' },
  { max: 120, label: 'warm up',   color: '#4ade80' },
  { max: 140, label: 'aerobic',   color: '#facc15' },
  { max: 160, label: 'threshold', color: '#fb923c' },
  { max: 999, label: 'max',       color: '#f87171' },
];
const stressZones = [
  { max: 25,  label: 'relaxed',  color: '#4ade80' },
  { max: 50,  label: 'low',      color: '#a3e635' },
  { max: 75,  label: 'moderate', color: '#facc15' },
  { max: 999, label: 'high',     color: '#f87171' },
];
const getHrZone     = hr => hrZones.find(z => hr <= z.max);
const getStressZone = s  => stressZones.find(z => s  <= z.max);

// ── session stats ─────────────────────────────────────────────
let sHrMin = Infinity, sHrMax = -Infinity, sHrSum = 0;
let sStressSum = 0, sCount = 0;

function onHr({ hr, rmssd, stress }) {
  const hrz = getHrZone(hr);
  document.getElementById('bpm-val').textContent  = hr;
  document.getElementById('hr-zone').textContent  = hrz.label;
  document.getElementById('hr-zone').style.color  = hrz.color;

  sHrMin = Math.min(sHrMin, hr);
  sHrMax = Math.max(sHrMax, hr);
  sHrSum += hr;
  sCount++;
  document.getElementById('s-hr-min').textContent = sHrMin;
  document.getElementById('s-hr-max').textContent = sHrMax;
  document.getElementById('s-hr-avg').textContent = Math.round(sHrSum / sCount);

  if (rmssd != null) {
    const lbl = rmssd > 60 ? 'excellent' : rmssd > 40 ? 'good' : rmssd > 20 ? 'fair' : 'low';
    document.getElementById('rmssd-val').textContent   = rmssd.toFixed(1);
    document.getElementById('rmssd-label').textContent = lbl;
  }

  if (stress != null) {
    const sz = getStressZone(stress);
    document.getElementById('stress-val').textContent   = stress;
    document.getElementById('stress-val').style.color   = sz.color;
    document.getElementById('stress-label').textContent = sz.label;
    document.getElementById('stress-label').style.color = sz.color;
    sStressSum += stress;
    document.getElementById('s-stress-avg').textContent = Math.round(sStressSum / sCount);
  }
}

// ── WebSocket ─────────────────────────────────────────────────
function connect() {
  const ws  = new WebSocket(`ws://${location.host}/ws`);
  const el  = document.getElementById('status');

  ws.onopen    = () => { el.textContent = 'connected';   el.className = 'connected'; };
  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'hr')  onHr(msg);
    if (msg.type === 'ecg') addEcgSamples(msg.samples);
  };
  ws.onclose   = () => {
    el.textContent = 'reconnecting';
    el.className   = 'connecting';
    setTimeout(connect, 2000);
  };
  ws.onerror = () => ws.close();
}
connect();
</script>
</body>
</html>
