<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>withlove</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0d0f;
    color: #e8e8e8;
    font-family: system-ui, -apple-system, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    user-select: none;
  }

  #status {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #444;
    transition: color 0.3s;
  }
  #status.connected { color: #4ade80; }
  #status.connecting { color: #facc15; }

  #bpm-display {
    display: flex;
    align-items: baseline;
    gap: 0.6rem;
  }

  #bpm {
    font-size: 9rem;
    font-weight: 800;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    color: #fff;
    transition: color 0.2s;
  }

  #bpm-unit {
    font-size: 1.4rem;
    color: #555;
    font-weight: 300;
    margin-bottom: 0.5rem;
  }

  #zone {
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #555;
    height: 1em;
    transition: color 0.3s;
  }

  #stats {
    display: flex;
    gap: 3.5rem;
    font-size: 0.8rem;
    color: #444;
  }

  #stats > span {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.3rem;
  }

  #stats strong {
    color: #aaa;
    font-size: 1.1rem;
    font-variant-numeric: tabular-nums;
  }

  #chart-wrap {
    width: min(680px, 90vw);
    height: 160px;
  }
</style>
</head>
<body>

<div id="status" class="connecting">connecting</div>

<div id="bpm-display">
  <span id="bpm">--</span>
  <span id="bpm-unit">bpm</span>
</div>

<div id="zone"></div>

<div id="stats">
  <span>min <strong id="s-min">--</strong></span>
  <span>max <strong id="s-max">--</strong></span>
  <span>avg <strong id="s-avg">--</strong></span>
</div>

<div id="chart-wrap">
  <canvas id="chart"></canvas>
</div>

<script>
const MAX_PTS = 60;
const labels = Array(MAX_PTS).fill('');
const hrData = Array(MAX_PTS).fill(null);

let sMin = Infinity, sMax = -Infinity, sSum = 0, sCount = 0;

// HR zone thresholds (% of ~200bpm max, simplified)
const zones = [
  { max: 100, label: 'rest',       color: '#60a5fa' },
  { max: 120, label: 'warm up',    color: '#4ade80' },
  { max: 140, label: 'aerobic',    color: '#facc15' },
  { max: 160, label: 'threshold',  color: '#fb923c' },
  { max: 999, label: 'max',        color: '#f87171' },
];

function getZone(hr) {
  return zones.find(z => hr <= z.max) ?? zones.at(-1);
}

const ctx = document.getElementById('chart').getContext('2d');
const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels,
    datasets: [{
      data: hrData,
      borderColor: '#f87171',
      borderWidth: 2,
      pointRadius: 0,
      tension: 0.35,
      fill: { target: 'origin', above: 'rgba(248,113,113,0.07)' },
      spanGaps: false,
    }]
  },
  options: {
    animation: false,
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { display: false }, tooltip: { enabled: false } },
    scales: {
      x: { display: false },
      y: {
        min: 40,
        max: 200,
        grid: { color: 'rgba(255,255,255,0.04)' },
        ticks: { color: '#444', font: { size: 11 }, maxTicksLimit: 5 },
        border: { display: false },
      }
    }
  }
});

function push(hr) {
  labels.push('');
  hrData.push(hr);
  labels.shift();
  hrData.shift();

  const zone = getZone(hr);
  chart.data.datasets[0].borderColor = zone.color;
  chart.data.datasets[0].fill.above = zone.color.replace(')', ', 0.07)').replace('rgb', 'rgba');
  chart.update('none');

  sMin = Math.min(sMin, hr);
  sMax = Math.max(sMax, hr);
  sSum += hr;
  sCount++;

  document.getElementById('bpm').textContent = hr;
  document.getElementById('zone').textContent = zone.label;
  document.getElementById('zone').style.color = zone.color;
  document.getElementById('s-min').textContent = sMin;
  document.getElementById('s-max').textContent = sMax;
  document.getElementById('s-avg').textContent = Math.round(sSum / sCount);
}

function connect() {
  const ws = new WebSocket(`ws://${location.host}/ws`);
  const statusEl = document.getElementById('status');

  ws.onopen = () => {
    statusEl.textContent = 'connected';
    statusEl.className = 'connected';
  };

  ws.onmessage = e => {
    const { hr } = JSON.parse(e.data);
    push(hr);
  };

  ws.onclose = () => {
    statusEl.textContent = 'reconnecting';
    statusEl.className = 'connecting';
    setTimeout(connect, 2000);
  };

  ws.onerror = () => ws.close();
}

connect();
</script>
</body>
</html>
